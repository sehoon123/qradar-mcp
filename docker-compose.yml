version: '3.8'

services:
  qradar-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qradar-mcp-server
    ports:
      - "127.0.0.1:5001:5000"
    environment:
      # QRadar app root
      - APP_ROOT=/opt/app-root/qradar-mcp

      # QRadar connection settings. QRADAR_HOST may be a full URL such as
      # http://192.168.1.10 when QRADAR_ALLOW_PLAIN_HTTP_PRIVATE_NETWORK=true.
      - QRADAR_HOST=${QRADAR_HOST}
      - QRADAR_ALLOW_PLAIN_HTTP_PRIVATE_NETWORK=${QRADAR_ALLOW_PLAIN_HTTP_PRIVATE_NETWORK:-false}
      - QRADAR_API_VERSION=${QRADAR_API_VERSION:-27.0}
      - QRADAR_COMPATIBILITY_FAIL_MODE=${QRADAR_COMPATIBILITY_FAIL_MODE:-closed}
      - QRADAR_AUTH_IDENTITY_PROBE=${QRADAR_AUTH_IDENTITY_PROBE:-strict}

      # Server settings
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MCP_HOST=0.0.0.0
      - MCP_PORT=5000
      - MCP_ACCESS_TOKEN=${MCP_ACCESS_TOKEN:?Set MCP_ACCESS_TOKEN before running qradar-mcp with MCP_HOST=0.0.0.0}
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount config where the local/Docker config loader expects it
      - ./config.json:/opt/app-root/config.json:ro

      # Mount logs directory
      - ./logs:/opt/app-root/logs

      # Mount source code for development (optional - comment out for production)
      # - ./:/opt/app-root/qradar-mcp:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${MCP_PORT:-5000}/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - qradar-mcp-network

networks:
  qradar-mcp-network:
    name: qradar-mcp-network
    driver: bridge
